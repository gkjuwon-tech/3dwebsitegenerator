<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hero Forge — AI 3D Hero Compiler</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <!-- the runtime mounts its canvas here, fixed behind the UI -->
    <div id="stage"></div>

    <!-- UI overlay -->
    <main id="ui">
      <header class="panel">
        <h1>HERO<span>FORGE</span></h1>
        <p class="tag">A scene compiler for high-end 3D heroes. Describe a site;
          the AI designs the sky, light, camera and models.</p>
        <form id="composer">
          <textarea id="prompt" rows="3"
            placeholder="e.g. A floating obsidian monolith over a misty volcanic island at blue hour, slow reveal, premium and ominous"></textarea>
          <button type="submit" id="go">Compile scene</button>
        </form>
        <div id="status" class="status"></div>
      </header>

      <section id="readout" class="panel readout" hidden>
        <h2>Art-direction</h2>
        <p id="notes" class="notes"></p>
        <dl id="provenance" class="prov"></dl>
        <div id="slots" class="slots"></div>
      </section>

      <!-- tall scroll track so scroll-scrub bindings have room to play -->
      <div class="scroll-space" aria-hidden="true">
        <div class="cue">scroll to play the camera ↓</div>
      </div>
    </main>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
